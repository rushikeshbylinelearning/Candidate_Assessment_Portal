name: Deploy to A2 Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug - Show repo structure
        run: |
          echo "=== ROOT ===" 
          ls -la
          echo "=== ALL package.json files ==="
          find . -name "package.json" -not -path "*/node_modules/*"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Frontend
        run: |
          cd Candidate_Assessment_Portal/frontend
          npm install
          npm run build

      - name: Upload Frontend Build via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          source: "Candidate_Assessment_Portal/frontend/dist/*"
          target: "/home/legatolx/assessment-portal.legatolxp.online/"
          strip_components: 3

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /home/legatolx/assessment-portal.legatolxp.online
            git pull --depth=1 origin main
            cd Candidate_Assessment_Portal/backend
            source /home/legatolx/nodevenv/assessment-portal.legatolxp.online/20/bin/activate
            npm install --production
            touch /home/legatolx/assessment-portal.legatolxp.online/tmp/restart.txt
