name: Deploy to A2 Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Frontend
        run: |
          cd frontend          # ✅ root level now
          npm install
          npm run build

      - name: Upload Frontend Build via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          source: "frontend/dist/*"        # ✅ updated path
          target: "/home/legatolx/assessment-portal.legatolxp.online/"
          strip_components: 2              # ✅ was 3, now 2

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /home/legatolx/assessment-portal.legatolxp.online
            git pull --depth=1 origin main
            cd backend                     # ✅ root level now
            source /home/legatolx/nodevenv/assessment-portal.legatolxp.online/20/bin/activate
            npm install --production
            pm2 restart assessment-portal --update-env   # ✅ PM2 restart
            pm2 save